---
- hosts: localhost:compute:laptops:incus
  become: true
  gather_facts: yes
  ignore_errors: true

  tasks:
    - name: Install common tools in MacOS
      macports:
        name:
          [
            "fd",
            "rsync",
            "alacritty",
            "tmux",
            "neovim",
            "git-delta",
            "ripgrep",
            "bat",
            "lsd",
            "topgrade",
            "procs",
            "skim",
            "dust",
            "tealdeer",
            "zoxide",
            "monolith",
            "sd",
          ]
        state: present
        selfupdate: yes
      when: ansible_distribution == "MacOSX"

    - name: Install common tools in FreeBSD
      pkgng:
        name:
          [
            "fd",
            "rsync",
            "neovim",
            "ripgrep",
            "bat",
            "lsd",
            "zoxide",
            "tree-sitter",
            "tree-sitter-cli",
            "gmake",
            "gcc",
            "git",
            "lua-language-server",
            "lua51-luarocks",
            "fzf",
            "ruff",
            "stylua",
            "uv",
            "python311-ty",
          ]
        state: present
      when: ansible_distribution == "FreeBSD"

    - name: Install common tools in Opensuse
      zypper:
        name:
          [
            "fd",
            "rsync",
            "neovim",
            "zoxide",
            "git-delta",
            "ripgrep",
            "git",
            "lazygit",
          ]
        state: present
        update_cache: yes
      when: ansible_os_family == "Suse"

    - name: Install common tools in Debian
      apt:
        name:
          [
            "rsync",
            "neovim",
            "zoxide",
            "ripgrep",
            "git",
            "python3-venv",
            "rustc",
            "python-dev-is-python3",
            "xclip",
            "xsel",
          ]
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"
